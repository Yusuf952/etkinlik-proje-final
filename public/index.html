<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Giriş Yap</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h2>Etkinlik Giriş</h2>

    <form id="loginForm">
      <label for="email">E-posta:</label>
      <input type="email" id="email" required>

      <label for="password">Şifre:</label>
      <input type="password" id="password" required>

      <button type="submit">Giriş Yap</button>
    </form>

    <p>Hesabınız yok mu? <a href="register.html">Kayıt Ol</a></p>
  </div>

  <!-- ✅ Login işlemi -->
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const result = await res.json();

      if (result.success) {
        localStorage.setItem("userEmail", email); // 📌 Email kaydı
        window.location.href = result.redirect;   // 📌 Admin mi User mı bakıp yönlendiriyor
      } else {
        alert(result.message || "Giriş başarısız.");
      }
    });
  </script>
</body>
</html>
